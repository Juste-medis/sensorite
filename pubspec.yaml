name: imu_navigator
description: GPS-fallback navigation using IMU sensors with Kalman filtering

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sensors_plus: ^4.0.2
  geolocator: ^11.0.0
  permission_handler: ^11.3.0
  path_provider: ^2.1.3
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
